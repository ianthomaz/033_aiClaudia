# aiClaudia - fragmento para /etc/nginx/conf.d/aiclaudia.conf no host
# Separado de bikeanjo-subdomains.conf. HTTPS proxy -> container nginx :8082 (/api -> Flask).

server {
    listen 443 ssl;
    server_name aiclaudia.com.br www.aiclaudia.com.br;

    ssl_certificate     /etc/letsencrypt/live/aiclaudia.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiclaudia.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name aiclaudia.com.br www.aiclaudia.com.br;
    return 301 https://$host$request_uri;
}
