# aiClaudia - fragmento para /etc/nginx/conf.d/aiclaudia.conf no host
# Arquivo separado para não conflitar com bikeanjo-subdomains.conf (deploy BikeAnjo não deve alterar este).
# Após colocar no servidor: sudo nginx -t && sudo systemctl reload nginx
# HTTPS: rodar certbot uma vez, ex.: sudo certbot --nginx -d aiclaudia.com.br -d www.aiclaudia.com.br

server {
    listen 80;
    server_name aiclaudia.com.br www.aiclaudia.com.br;
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
