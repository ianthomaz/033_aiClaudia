# Dados de sessão/env - usamos start_iclaudia.sh para carregar variáveis
services:
  aiclaudia:
    image: nginx:alpine
    container_name: aiclaudia
    ports:
      - "8082:80"
    volumes:
      - ../index.html:/usr/share/nginx/html/index.html:ro
      - ../front:/usr/share/nginx/html/front:ro
      - ../img:/usr/share/nginx/html/img:ro
      - ../dashboard:/usr/share/nginx/html/dashboard:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NGINX_HOST=${NGINX_HOST:-localhost}
    restart: unless-stopped
    networks:
      - aiclaudia_network

  api:
    build: .
    container_name: aiclaudia_api
    ports:
      - "5001:5000"
    volumes:
      - .:/app/deploy:ro
      - ../front:/app/front:ro
    environment:
      - DB_NAME=${DB_NAME:-aiclaudia}
      - DB_USER=${DB_USER:-aiclaudia}
      - DB_PASSWORD=${DB_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHATGPT_API_KEY=${CHATGPT_API_KEY}
      - API_PORT=5000
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    depends_on:
      - database
    restart: unless-stopped
    networks:
      - aiclaudia_network

  database:
    image: postgres:15-alpine
    container_name: aiclaudia_db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-aiclaudia}
      POSTGRES_USER: ${DB_USER:-aiclaudia}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - aiclaudia_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aiclaudia_network

networks:
  aiclaudia_network:
    driver: bridge

volumes:
  aiclaudia_data: